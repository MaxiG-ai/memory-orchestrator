# see https://docs.litellm.ai/docs/providers/sap#step-2-set-your-credentials for setup instructions

[models.gpt-4-1-mini]
litellm_name = "sap/gpt-4.1-mini"
context_window = 128000
temperature = 0
provider = "aicore"

